<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Homework Worksheet</title></head>
<body>
  <h2>Student Information</h2>
  <form>
    <label>Full Name: <input type="text" name="student_name"></label><br>
    <label>Email: <input type="email" name="email"></label><br>
    <label>Phone: <input type="tel" name="phone"></label><br>
    <label>Date of Birth: <input type="date" name="dob"></label><br>
    <label>Grade: 
      <select name="grade">
        <option value="">Select</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
    </label><br>
    <label>State: 
      <select name="state">
        <option value="">Select</option>
        <option value="CA">California</option>
        <option value="TX">Texas</option>
        <option value="NY">New York</option>
      </select>
    </label><br>
    <label><input type="checkbox" name="agree"> I agree to the terms</label><br>
    <label>Comments:<br><textarea name="comments" rows="3" cols="40"></textarea></label><br>
  </form>
</body>
</html>
